<!DOCTYPE html>
<html>
<head>
<style>
body{
  margin:0;
  height:100vh;
  display:grid;
  place-items:center;
  background:#222;
}

.box{
  position:relative;
  width:400px;
  height:250px;
  overflow:hidden;
  border-radius:12px;
}

.box img,
.left,
.right{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.left,.right{
  background:url("https://picsum.photos/id/1020/400/250")
             center/cover;
  transition:transform 3s ease;
}

/* top image split diagonally */
.left{
  clip-path:polygon(0 0,100% 0,40% 100%,0 100%);
}

.right{
  clip-path:polygon(100% 0,100% 100%,40% 100%);
}

.box:hover .left{
  transform:translateX(-120%);
}

.box:hover .right{
  transform:translateX(120%);
}
</style>
</head>
<body>

<div class="box">
  <!-- image revealed underneath -->
  <img src="https://picsum.photos/id/1015/400/250">

  <!-- top image pieces -->
  <div class="left"></div>
  <div class="right"></div>
</div>

</body>
</html>
